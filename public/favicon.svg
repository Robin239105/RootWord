<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.85;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 1px #C4973A); }
      50% { filter: drop-shadow(0 0 3px #E5B85C); }
    }
    .amber-seed {
      transform-origin: 16px 16px;
      animation: pulse 4s ease-in-out infinite, glow 4s ease-in-out infinite;
    }
    .branch-path {
      transform-origin: 16px 16px;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: grow-roots 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes grow-roots {
      to { stroke-dashoffset: 0; }
    }
  </style>
  
  <g class="amber-seed">
    <!-- Outer delicate historical ring -->
    <circle cx="16" cy="16" r="13" stroke="#C4973A" stroke-width="0.75" stroke-dasharray="2 3" fill="none" opacity="0.65" style="transform-origin: 16px 16px; animation: spin 30s linear infinite;" />
    
    <!-- Stylized gold tree root of ancestors -->
    <path class="branch-path" d="M16 16v7m0-7c-1.8 1.8-4.5 2.7-6 5m6-5c1.8 1.8 4.5 2.7 6 5M16 16V9m0 7c-1.8-1.8-3.5-3.5-4.5-6m4.5 6c1.8-1.8 3.5-3.5 4.5-6" stroke="#C4973A" stroke-width="1.5" stroke-linecap="round" fill="none" />
    
    <!-- Central luminous core seed -->
    <circle cx="16" cy="16" r="2" fill="#EDE0C4" stroke="#C4973A" stroke-width="1" />
  </g>
</svg>
